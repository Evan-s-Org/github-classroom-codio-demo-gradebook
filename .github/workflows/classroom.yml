name: Autograding Tests

on:
  push:
  workflow_dispatch:

jobs:
  run-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run visible unit tests
        run: python3 -m unittest discover -s tests -p "test_*.py" -v
